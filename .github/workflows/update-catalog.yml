name: Update AI App Catalog

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Read-only — the robot now writes suggestions directly to Supabase,
# not to the repo, so it doesn't need contents:write or pull-requests:write.
permissions:
  contents: read

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run catalog update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update-catalog.js
