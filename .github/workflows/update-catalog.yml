name: Update AI App Catalog

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.email "robot@ai-app-catalog.com"
          git config user.name "AI Catalog Robot"

      - name: Run catalog update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-catalog.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/apps.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new apps found this run"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New apps found!"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Auto-update: new AI apps discovered"
          title: "🤖 New AI apps ready to review"
          body: |
            ## New AI Apps Found

            The robot found new apps to add
            to the catalog.

            ### How to add them:
            1. Review the apps in the
               Files Changed tab below
            2. Click Merge pull request
            3. Site updates automatically

            *Generated by AI Catalog Robot*
          branch: auto-update-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            data/apps.json
            scripts/last-update-summary.txt
